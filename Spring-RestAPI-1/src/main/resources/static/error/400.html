<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Error</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4b4b,#ff7676);
}

.error-container{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    width:400px;
}

.error-code{
    font-size:80px;
    font-weight:bold;
    color:#e74c3c;
}

.error-title{
    font-size:28px;
    margin:10px 0;
    color:#333;
}

.error-message{
    color:#666;
    margin-bottom:20px;
}

.home-btn{
    display:inline-block;
    text-decoration:none;
    background:#e74c3c;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    transition:0.3s;
}

.home-btn:hover{
    background:#c0392b;
}
</style>

</head>
<body>

<div class="error-container">
    <div class="error-code">⚠</div>
    <h1 class="error-title">Something Went Wrong</h1>
    <p class="error-message">
        Sorry, an unexpected error has occurred.
        Please try again later.
    </p>

    <a href="/" class="home-btn">Go Home</a>
</div>

</body>
</html>
